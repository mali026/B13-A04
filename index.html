<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="main">
        <head class="header">
           <h1>Job Application Tracker</h1> 
        </head>
        <section class="dashboard">
            <div class="dash-card">
                <p>Total</p>
                <h2 id="totalCount">8</h2>
            </div>
            <div class="dash-card">
                <p>Interview</p>
                <h2 class="green" id="interviewCount">0</h2>
            </div>
            <div class="dash-card">
                <p>Rejected</p>
                <h2 class="red" id="rejectCount">0</h2>
            </div>
        </section>

        <section class="jobs-section">
          <div class="jobs-header">
             <h2>Available Jobs</h2>
             <span id="tabJobCount">8 jobs</span>
          </div>

          <div class="tabs">
             <button class="tab active" data-tab="all">All</button>

             <button class="tab" data-tab="interview">Interview</button>

             <button class="tab" data-tab="rejected">Rejected</button>
          </div>

          <div id="jobList" class="job-list"></div>

          <div id="emptyState" class="empty-state">
            <img src="B13-A4-PH-Job-Tracker/jobs.png" alt="no jobs">
            <h3>No jobs available</h3>
            <p>Check back soon for new job opportunities</p>
          </div>
        </section>

    </main>

    <script src="javascript/script.js"></script>
</body>
</html>
