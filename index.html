<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

<main class="main">
  <header class="header">
    <h1>Job Application Tracker</h1>
  </header>

  <section class="dashboard">
    <div class="dash-card">
      <p>Total</p>
      <h2 id="totalCount">8</h2>
    </div>
    <div class="dash-card">
      <p>Interview</p>
      <h2 class="green" id="interviewCount">0</h2>
    </div>
    <div class="dash-card">
      <p>Rejected</p>
      <h2 class="red" id="rejectedCount">0</h2>
    </div>
  </section>

  <section class="jobs-section">
    <div class="jobs-header">
      <h2>Available Jobs</h2>
      <span id="tabJobCount">8 jobs</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="interview">Interview</button>
      <button class="tab" data-tab="rejected">Rejected</button>
    </div>

    <div id="jobList" class="job-list"></div>

    <div id="emptyState" class="empty-state">
      <img src="B13-A4-PH-Job-Tracker/jobs.png" alt="No jobs" />
      <h3>No jobs available</h3>
      <p>Check back soon for new job opportunities</p>
    </div>
  </section>
</main>

<script src="javascript/script.js"></script>
</body>
</html>
